name: Build Container Stack

on:
  push:
    branches: [ main ]
    paths: [ 'Dockerfile' ]
  workflow_dispatch: # Allows manual testing

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Downcase Image Name for Docker Compliance
        run: |
          # Converts "Neurohackademy2026/repo" to "neurohackademy2026/repo"
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}/dmri-processor" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest