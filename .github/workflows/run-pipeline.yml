name: Execute dMRI Pipeline

on:
  workflow_dispatch: # Allows clicking 'Run' in the browser
    inputs:
      release_tag:
        description: 'Release tag containing the scan data asset'
        required: false
        default: 'v1.0-data'
        type: string
      asset_name:
        description: 'Name of the scan data asset to download from the release'
        required: false
        default: 'sample_dmri.nii.gz'
        type: string
  release:
    types: [published] # Triggers automatically when a new release is built

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Downcase Image Name for Docker Compliance
        id: image
        run: |
          echo "name=ghcr.io/$(echo "${{ github.repository }}/dmri-processor" | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_OUTPUT

  run-analysis:
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      packages: read # Required to pull the private GHCR image
    outputs:
      snr: ${{ steps.stats.outputs.snr }}
      resolution: ${{ steps.stats.outputs.resolution }}
      volumes: ${{ steps.stats.outputs.volumes }}
      status: ${{ steps.stats.outputs.status }}

    # Point directly to your prebuilt container
    container:
      image: ${{ needs.prep.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Cache dipy Datasets
        uses: actions/cache@v4
        with:
          path: /github/home/.dipy
          key: dipy-stanford-hardi-v1

      - name: Attempt Data Retrieval from GitHub Releases
        id: download-data
        run: |
          # Use Git CLI built-in release commands
          TAG="${{ inputs.release_tag || github.event.release.tag_name || 'v1.0-data' }}"
          ASSET="${{ inputs.asset_name || 'sample_dmri.nii.gz' }}"
          gh release download "$TAG" --pattern "$ASSET" --clobber || echo "No real scan asset found. Fallback triggered."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Core Python Processing
        run: python process_dmri.py
        env:
          INPUT_FILE: ${{ inputs.asset_name || 'sample_dmri.nii.gz' }}

      # Create dashboard files before deploying
      - name: Construct Website Assets
        id: stats
        run: |
          # Read raw statistics
          SNR=$(python -c "import json; print(json.load(open('output/stats.json'))['snr_value'])")
          RES=$(python -c "import json; print(json.load(open('output/stats.json'))['resolution'])")
          VOLS=$(python -c "import json; print(json.load(open('output/stats.json'))['total_volumes'])")
          STATUS=$(python -c "import json; print(json.load(open('output/stats.json'))['status'])")

          # Expose stats as job outputs for the optional notify job
          echo "snr=$SNR" >> "$GITHUB_OUTPUT"
          echo "resolution=$RES" >> "$GITHUB_OUTPUT"
          echo "volumes=$VOLS" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          # Inject stats into clean template
          cat > output/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head><title>dMRI Pipeline QC Report</title></head>
          <body>
            <h1>dMRI Pipeline QC Report</h1>
            <p>Status: ${STATUS}</p>
            <p>SNR: ${SNR}</p>
            <p>Resolution: ${RES}</p>
            <p>Volumes: ${VOLS}</p>
            <img src="qc_slice.png" alt="QC slice">
          </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy-pages:
    needs: run-analysis
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [run-analysis, deploy-pages]
    runs-on: ubuntu-latest
    steps:
      # Optional: only sends if MAIL_USERNAME/MAIL_PASSWORD/MAIL_TO secrets are configured.
      # See README for setup instructions.
      - name: Check Mail Config
        id: check-mail
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          if [ -n "$MAIL_USERNAME" ] && [ -n "$MAIL_PASSWORD" ] && [ -n "$MAIL_TO" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email Result Notification
        if: steps.check-mail.outputs.configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.MAIL_PORT || '465' }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: dMRI Pipeline
          subject: "dMRI Pipeline Result: ${{ needs.run-analysis.outputs.status }}"
          body: |
            New dMRI pipeline run completed.

            Status:     ${{ needs.run-analysis.outputs.status }}
            SNR:        ${{ needs.run-analysis.outputs.snr }}
            Resolution: ${{ needs.run-analysis.outputs.resolution }}
            Volumes:    ${{ needs.run-analysis.outputs.volumes }}

            Report: ${{ needs.deploy-pages.outputs.page_url }}